name: Morning Briefing

# ── Schedule ──────────────────────────────────────────────────────────────────
# Runs at 11:30 AM UTC daily.
#   • In winter (EST, UTC-5): 11:30 UTC = 6:30 AM ✓
#   • In summer (EDT, UTC-4): 11:30 UTC = 7:30 AM
#
# To target 6:30 AM in summer EDT, change cron to: '30 10 * * *'
# (that will then be 5:30 AM in winter EST — pick whichever trade-off you prefer).
#
# You can also trigger a run manually via the GitHub Actions UI ("Run workflow")
# which is handy for testing.
on:
  schedule:
    - cron: '30 11 * * *'
  workflow_dispatch:   # enable manual runs from the GitHub Actions UI

jobs:
  send-briefing:
    name: Generate & send briefing
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send morning briefing
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TWILIO_ACCOUNT_SID:  ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:   ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER:  ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER:    ${{ secrets.TWILIO_TO_NUMBER }}
        run: python briefing.py
